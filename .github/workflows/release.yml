name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_suffix: x86_64-unknown-linux-gnu
            package_kind: tar
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive_suffix: aarch64-apple-darwin
            package_kind: tar
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_suffix: x86_64-pc-windows-msvc
            package_kind: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked --target ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Compute archive names
        shell: bash
        run: |
          set -euo pipefail
          asset_dir="zist-${GITHUB_REF_NAME}-${{ matrix.archive_suffix }}"
          if [ "${{ matrix.package_kind }}" = "zip" ]; then
            ext="zip"
          else
            ext="tar.gz"
          fi
          archive_name="${asset_dir}.${ext}"
          stable_name="zist-${{ matrix.archive_suffix }}.${ext}"
          {
            echo "ASSET_DIR=$asset_dir"
            echo "ARCHIVE_NAME=$archive_name"
            echo "STABLE_NAME=$stable_name"
          } >> "$GITHUB_ENV"

      - name: Stage Unix release archive
        if: matrix.package_kind == 'tar'
        shell: bash
        run: |
          set -euo pipefail
          dir="$ASSET_DIR"
          mkdir -p "$dir"
          cp LICENSE README.md "$dir"/
          for bin in zist unzist; do
            cp "target/${{ matrix.target }}/release/$bin" "$dir/$bin"
          done
          tar -czf "$ARCHIVE_NAME" "$dir"
          cp "$ARCHIVE_NAME" "$STABLE_NAME"
          shasum -a 256 "$ARCHIVE_NAME" "$STABLE_NAME" > "${ARCHIVE_NAME}.sha256"

      - name: Stage Windows release archive
        if: matrix.package_kind == 'zip'
        shell: pwsh
        run: |
          $dir = $env:ASSET_DIR
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item LICENSE, README.md -Destination $dir
          foreach ($bin in "zist", "unzist") {
            Copy-Item "target/${{ matrix.target }}/release/$bin.exe" -Destination "$dir/$bin.exe"
          }
          Compress-Archive -Path $dir -DestinationPath $env:ARCHIVE_NAME -Force
          Copy-Item $env:ARCHIVE_NAME -Destination $env:STABLE_NAME
          $hashes = @($env:ARCHIVE_NAME, $env:STABLE_NAME) | ForEach-Object {
            $h = (Get-FileHash -Algorithm SHA256 $_).Hash.ToLower()
            "$h  $_"
          }
          $hashes -join "`n" | Set-Content -Encoding ascii "$($env:ARCHIVE_NAME).sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.STABLE_NAME }}
            ${{ env.ARCHIVE_NAME }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*/*
          generate_release_notes: true
